<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HTML 报告预览索引</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --text: #172033;
      --muted: #667085;
      --line: #d9dee7;
      --panel: #ffffff;
      --accent: #1769aa;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.65;
    }
    main {
      width: min(920px, calc(100% - 32px));
      margin: 48px auto;
    }
    header {
      margin-bottom: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: var(--muted);
    }
    .list {
      display: grid;
      gap: 14px;
    }
    a.report {
      display: block;
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: inherit;
      text-decoration: none;
    }
    a.report:hover {
      border-color: var(--accent);
    }
    .title {
      display: block;
      margin-bottom: 4px;
      font-weight: 700;
    }
    .file {
      display: block;
      color: var(--muted);
      font-size: 14px;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>HTML 报告预览索引</h1>
      <p>上传本目录到 GitHub Pages 后，可从本页进入各报告。</p>
    </header>
    <section class="list" aria-label="报告列表">
      <a class="report" href="20260519_guangzhou_community_renewal_trend_report_v1.html">
        <span class="title">广州社区级城市更新趋势总结报告 V1</span>
        <span class="file">20260519_guangzhou_community_renewal_trend_report_v1.html</span>
      </a>
      <a class="report" href="20260518_project_development_trend_analysis_report.html">
        <span class="title">项目发展趋势课题分析报告</span>
        <span class="file">20260518_project_development_trend_analysis_report.html</span>
      </a>
      <a class="report" href="20260518_community_renewal_aging_friendly_business_deployment_report.html">
        <span class="title">社区级城市更新与适老化融合业务部署报告</span>
        <span class="file">20260518_community_renewal_aging_friendly_business_deployment_report.html</span>
      </a>
    </section>
  </main>
</body>
</html>
